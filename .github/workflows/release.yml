name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tui/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tui/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build TUI (release)
        working-directory: tui
        run: cargo build --release

      - name: Configure CMake
        working-directory: engine
        run: cmake -B build

      - name: Build Engine DLL
        working-directory: engine
        run: cmake --build build --config Release

      - name: Run Engine Tests
        working-directory: engine/build
        run: ctest -C Release --output-on-failure

      - name: Package Player zip
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          STAGE="EFL-${VERSION}"
          mkdir -p "${STAGE}/hello_adventurer"
          cp engine/build/bin/Release/EFL.dll "${STAGE}/" 2>/dev/null || true
          cp release/player/INSTALL.txt "${STAGE}/"
          cp -r examples/hello_adventurer/* "${STAGE}/hello_adventurer/"
          7z a "EFL-${VERSION}.zip" "${STAGE}"

      - name: Package DevKit zip
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          STAGE="EFL-DevKit-${VERSION}"
          mkdir -p "${STAGE}"
          cp engine/build/bin/Release/EFL.dll "${STAGE}/" 2>/dev/null || true
          cp tui/target/release/efl-tui.exe "${STAGE}/" 2>/dev/null || true
          cp release/devkit/INSTALL.txt "${STAGE}/"
          cp release/devkit/TUI_USAGE.txt "${STAGE}/"
          cp release/devkit/GETTING_STARTED.txt "${STAGE}/"
          7z a "EFL-DevKit-${VERSION}.zip" "${STAGE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EFL-${{ github.ref_name }}.zip
            EFL-DevKit-${{ github.ref_name }}.zip
          body: |
            ## EFL ${{ github.ref_name }}

            ### Downloads

            - **EFL-${{ github.ref_name }}.zip** — For players: EFL engine + example content pack + install guide
            - **EFL-DevKit-${{ github.ref_name }}.zip** — For developers: EFL engine + TUI diagnostic tool + dev guides

            ### Player Install
            Drop `EFL.dll` into `<game>\mods\aurie\` and content packs into `<game>\mods\efl\`.

            ### Developer Install
            See `INSTALL.txt` and `TUI_USAGE.txt` in the DevKit zip.
