name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install doc build tools (Pandoc + wkhtmltopdf)
        shell: pwsh
        run: |
          choco install pandoc -y --no-progress
          choco install wkhtmltopdf -y --no-progress

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            devkit/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('devkit/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build DevKit (release)
        working-directory: devkit
        run: cargo build --release

      - name: Configure CMake
        working-directory: engine
        run: cmake -B build

      - name: Build Engine DLL
        working-directory: engine
        run: cmake --build build --config Release

      - name: Run Engine Tests
        working-directory: engine/build
        run: ctest -C Release --output-on-failure

      - name: DevKit unit tests
        working-directory: devkit
        run: cargo test --lib --release

      - name: Pack example via efl-pack CLI (smoke)
        shell: bash
        run: |
          set -euo pipefail
          STAGE_OUT="${RUNNER_TEMP}/efl-release-pack-out"
          mkdir -p "${STAGE_OUT}"
          ./devkit/target/release/efl-pack.exe examples/hello_adventurer \
            --profile recommended \
            --output "${STAGE_OUT}"
          ART=$(find "${STAGE_OUT}" -name "*.efpack" -type f -size +0 | head -n 1)
          if [ -z "${ART}" ]; then
            echo "release: no .efpack artifact produced" >&2
            exit 1
          fi
          echo "EFPACK_SMOKE_ARTIFACT=${ART}" >> "${GITHUB_ENV}"

          ./devkit/target/release/efl-pack.exe examples/hello_compat \
            --profile recommended \
            --output "${STAGE_OUT}"
          DAT=$(find "${STAGE_OUT}" -name "*.efdat" -type f -size +0 | head -n 1)
          if [ -z "${DAT}" ]; then
            echo "release: no .efdat artifact produced" >&2
            exit 1
          fi
          echo "EFDAT_SMOKE_ARTIFACT=${DAT}" >> "${GITHUB_ENV}"

      - name: Audit release docs for stale terminology
        shell: bash
        run: |
          set -euo pipefail
          FILES=(
            docs/player/installing-content-packs.md
            docs/authoring/getting-started.md
            docs/authoring/content-types.md
            docs/authoring/manifest-reference.md
            docs/authoring/examples.md
            docs/devkit/devkit-guide.md
            docs/devkit/diagnostic-codes.md
            docs/internals/architecture.md
            docs/internals/engine-bridge.md
            docs/internals/ipc-protocol.md
            docs/internals/save-format.md
            release/devkit/USAGE.txt
            release/devkit/GETTING_STARTED.txt
          )
          STALE_PATTERN='Crystal Caves|V2-example-mod|\"native\" is planned but not yet available|NativeRoomBackend activated but native rooms are not yet implemented'
          if rg -n -i "${STALE_PATTERN}" "${FILES[@]}"; then
            echo "release-doc-audit: stale documentation terms found; update docs before releasing." >&2
            exit 1
          fi

      - name: Build PDF docs for release package
        shell: pwsh
        run: |
          $DOC_OUT = Join-Path $env:RUNNER_TEMP "efl-release-pdf-docs"
          New-Item -ItemType Directory -Force -Path $DOC_OUT | Out-Null

          pandoc docs/player/installing-content-packs.md --from gfm --pdf-engine=wkhtmltopdf -V geometry:margin=1in -o (Join-Path $DOC_OUT "EFL_Player_Guide.pdf")

          pandoc docs/authoring/getting-started.md docs/authoring/content-types.md docs/authoring/manifest-reference.md docs/authoring/examples.md --from gfm --pdf-engine=wkhtmltopdf -V geometry:margin=1in -o (Join-Path $DOC_OUT "EFL_Authoring_Guide.pdf")

          pandoc docs/devkit/devkit-guide.md docs/devkit/diagnostic-codes.md --from gfm --pdf-engine=wkhtmltopdf -V geometry:margin=1in -o (Join-Path $DOC_OUT "EFL_DevKit_Guide.pdf")

          pandoc docs/internals/architecture.md docs/internals/engine-bridge.md docs/internals/ipc-protocol.md docs/internals/save-format.md --from gfm --pdf-engine=wkhtmltopdf -V geometry:margin=1in -o (Join-Path $DOC_OUT "EFL_Internals_Reference.pdf")

          pandoc docs/authoring/examples.md --from gfm --pdf-engine=wkhtmltopdf -V geometry:margin=1in -o (Join-Path $DOC_OUT "EFL_Example_Mod_Guide.pdf")

          Get-ChildItem $DOC_OUT
          "PDF_DOC_DIR=$DOC_OUT" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package Player zip
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          STAGE="EFL-${VERSION}"
          mkdir -p "${STAGE}"
          cp engine/build/bin/Release/EFL.dll "${STAGE}/" 2>/dev/null || true
          cp release/player/INSTALL.txt "${STAGE}/"
          7z a "EFL-${VERSION}.zip" "${STAGE}"

      - name: Package DevKit zip
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          STAGE="EFL-DevKit-${VERSION}"
          DEVKIT="${STAGE}/EFL DevKit"
          DOCS="${STAGE}/Docs"
          mkdir -p "${DEVKIT}" "${DOCS}"

          # DevKit app + headless CLI
          cp engine/build/bin/Release/EFL.dll "${DEVKIT}/" 2>/dev/null || true
          cp devkit/target/release/efl-devkit.exe "${DEVKIT}/" 2>/dev/null || true
          cp devkit/target/release/efl-pack.exe   "${DEVKIT}/" 2>/dev/null || true

          # Documentation (PDF release docs)
          cp "${PDF_DOC_DIR}/EFL_Player_Guide.pdf"        "${DOCS}/"
          cp "${PDF_DOC_DIR}/EFL_Authoring_Guide.pdf"     "${DOCS}/"
          cp "${PDF_DOC_DIR}/EFL_DevKit_Guide.pdf"        "${DOCS}/"
          cp "${PDF_DOC_DIR}/EFL_Internals_Reference.pdf" "${DOCS}/"
          cp "${PDF_DOC_DIR}/EFL_Example_Mod_Guide.pdf"   "${DOCS}/"

          # Schemas as a single zip (not raw folder)
          7z a "${STAGE}/schemas.zip" "schemas/*"
          cp release/devkit/SCHEMAS.txt "${STAGE}/"

          # Example workspace(s) + prebuilt artifacts
          mkdir -p "${STAGE}/examples"
          cp -r examples/hello_adventurer "${STAGE}/examples/hello_adventurer"
          mkdir -p "${STAGE}/examples/prebuilt"
          if [ -n "${EFPACK_SMOKE_ARTIFACT:-}" ] && [ -f "${EFPACK_SMOKE_ARTIFACT}" ]; then
            cp "${EFPACK_SMOKE_ARTIFACT}" "${STAGE}/examples/prebuilt/" || true
          fi

          # Usage guide
          cp release/devkit/USAGE.txt "${STAGE}/"
          cp release/devkit/GETTING_STARTED.txt "${STAGE}/"

          7z a "EFL-DevKit-${VERSION}.zip" "${STAGE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EFL-${{ github.ref_name }}.zip
            EFL-DevKit-${{ github.ref_name }}.zip
          body: |
            ## EFL ${{ github.ref_name }}

            ### Downloads

            - **EFL-${{ github.ref_name }}.zip** — User package: EFL.dll + drag-and-drop install guide
            - **EFL-DevKit-${{ github.ref_name }}.zip** — Developer package: EFL.dll + portable DevKit + schemas.zip + example mod + PDF docs

            ### Player Install
            Drop `EFL.dll` into `<game>\mods\aurie\` and content packs into `<game>\mods\efl\`.
            See `INSTALL.txt` for step-by-step instructions.

            ### Mod Author Install
            See `EFL DevKit\` folder for the GUI tool and `GETTING_STARTED.txt` to get going.
            Full documentation is in `Docs\` as PDF guides.
