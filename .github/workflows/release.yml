name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tui/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tui/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build DevKit (release)
        working-directory: tui
        run: cargo build --release

      - name: Configure CMake
        working-directory: engine
        run: cmake -B build

      - name: Build Engine DLL
        working-directory: engine
        run: cmake --build build --config Release

      - name: Run Engine Tests
        working-directory: engine/build
        run: ctest -C Release --output-on-failure

      - name: Generate V2 documentation PDFs
        shell: bash
        run: |
          pip install reportlab --quiet
          python .temp/gen_pdfs.py

      - name: Package Player zip
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          STAGE="EFL-${VERSION}"
          mkdir -p "${STAGE}"
          cp engine/build/bin/Release/EFL.dll "${STAGE}/" 2>/dev/null || true
          cp release/player/INSTALL.txt "${STAGE}/"
          7z a "EFL-${VERSION}.zip" "${STAGE}"

      - name: Package DevKit zip
        shell: bash
        run: |
          VERSION=${{ github.ref_name }}
          STAGE="EFL-DevKit-${VERSION}"
          DEVKIT="${STAGE}/EFL DevKit"
          DOCS="${STAGE}/Docs"
          mkdir -p "${DEVKIT}" "${DOCS}"

          # DevKit app
          cp engine/build/bin/Release/EFL.dll "${DEVKIT}/" 2>/dev/null || true
          cp tui/target/release/efl-devkit.exe "${DEVKIT}/" 2>/dev/null || true

          # V2 documentation
          cp .temp/docs/EFL_Player_Guide.pdf       "${DOCS}/"
          cp .temp/docs/EFL_Authoring_Guide.pdf    "${DOCS}/"
          cp .temp/docs/EFL_DevKit_Guide.pdf       "${DOCS}/"
          cp .temp/docs/EFL_Internals_Reference.pdf "${DOCS}/"
          cp .temp/docs/EFL_Example_Mod_Guide.pdf  "${DOCS}/"

          # Usage guide
          cp release/devkit/USAGE.txt "${STAGE}/"

          7z a "EFL-DevKit-${VERSION}.zip" "${STAGE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EFL-${{ github.ref_name }}.zip
            EFL-DevKit-${{ github.ref_name }}.zip
          body: |
            ## EFL ${{ github.ref_name }}

            ### Downloads

            - **EFL-${{ github.ref_name }}.zip** — For players: EFL.dll + install guide
            - **EFL-DevKit-${{ github.ref_name }}.zip** — For mod authors: EFL.dll + DevKit app + full V2 documentation

            ### Player Install
            Drop `EFL.dll` into `<game>\mods\aurie\` and content packs into `<game>\mods\efl\`.
            See `INSTALL.txt` for step-by-step instructions.

            ### Mod Author Install
            See `EFL DevKit\` folder for the GUI tool and `Docs\EFL_DevKit_Guide.pdf` for usage.
            Start with `Docs\EFL_Authoring_Guide.pdf` to build your first content pack.
